# Render Blueprint — Fisko API (homologação) usando o Dockerfile validado.
# Deploy: Render Dashboard → New → Blueprint → conectar FiskoPy/fisko → Apply.
# Provisiona o web service (Docker) + Postgres + variáveis automaticamente.

databases:
  - name: fisko-db
    databaseName: fisko
    user: fisko
    plan: free # Postgres grátis (expira ~30 dias; ok p/ homologação)

services:
  - type: web
    name: fisko-api
    runtime: docker
    plan: free
    region: oregon
    # Monorepo: rootDir escopa tudo para apps/api; Dockerfile/contexto ficam relativos a ele.
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fisko-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: GOOGLE_CLIENT_ID
        value: 686268310274-tet8th5uu2qdmav1afekd8a3csojtkgg.apps.googleusercontent.com
      # Defina depois com a URL pública (melhora o link do e-mail de recuperação).
      - key: APP_URL
        sync: false
